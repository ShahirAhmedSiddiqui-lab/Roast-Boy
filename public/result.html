<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>RoastBoy - Your Roast Results</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'roast-black': '#0a0a0a',
            'roast-orange': '#ff6b00',
            'roast-red': '#ff2e00',
            'roast-gray': '#1a1a1a',
          },
          fontFamily: {
            'display': ['Bungee', 'cursive'],
            'sans': ['Inter', 'sans-serif'],
          },
          animation: {
            'flicker': 'flicker 2s infinite',
          },
          keyframes: {
            flicker: {
              '0%, 100%': { opacity: 1 },
              '50%': { opacity: 0.8 },
            }
          }
        }
      }
    }
  </script>
  <style data-purpose="custom-typography">
    .text-glow {
      text-shadow: 0 0 10px rgba(255, 107, 0, 0.5);
    }
    .fire-gradient {
      background: linear-gradient(to bottom right, #ff6b00, #ff2e00);
    }
    .card-border {
      border: 1px solid rgba(255, 107, 0, 0.2);
    }
  </style>
</head>
<body class="bg-roast-black text-white font-sans min-h-screen selection:bg-roast-orange selection:text-white">
  <!-- Header -->
  <header class="p-6 flex justify-between items-center">
    <div class="flex items-center gap-2">
      <span class="text-3xl animate-flicker">🔥</span>
      <h1 class="font-display text-2xl tracking-tighter text-roast-orange">RoastBoy</h1>
    </div>
    <nav>
      <a class="text-sm font-bold uppercase tracking-widest hover:text-roast-orange transition-colors" href="/">Home</a>
    </nav>
  </header>

  <!-- Main Content -->
  <main class="px-4 py-8 md:py-12">
    <div class="max-w-4xl mx-auto space-y-8">
      <!-- Result Header -->
      <div class="text-center mb-10">
        <h2 class="text-4xl md:text-6xl font-black italic uppercase leading-none">
          You got <span class="text-roast-red">Cooked.</span>
        </h2>
        <p class="text-gray-400 mt-4 text-lg">Here's the damage, plus a little help since you clearly need it.</p>
      </div>

      <!-- Results Grid -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="capture-area">
        <!-- Left Card: The Roast -->
        <section class="bg-roast-gray p-8 rounded-3xl border-2 border-roast-red relative overflow-hidden group">
          <div class="absolute -top-10 -right-10 text-9xl opacity-5 pointer-events-none font-display">ROAST</div>
          <div class="relative z-10">
            <span class="inline-block bg-roast-red text-white text-xs font-bold px-3 py-1 rounded-full mb-4 uppercase tracking-widest">The Roast</span>
            <div id="roast-content" class="space-y-4 text-gray-300 text-lg italic leading-relaxed min-h-32">
              <p class="animate-pulse">Loading your roast...</p>
            </div>
          </div>
          <div class="absolute bottom-0 left-0 w-full h-1 fire-gradient"></div>
        </section>

        <!-- Right Card: The Glow Up -->
        <section class="bg-roast-gray p-8 rounded-3xl border-2 border-roast-orange relative overflow-hidden group">
          <div class="absolute -top-10 -right-10 text-9xl opacity-5 pointer-events-none font-display">GLOW</div>
          <div class="relative z-10">
            <span class="inline-block bg-roast-orange text-white text-xs font-bold px-3 py-1 rounded-full mb-4 uppercase tracking-widest">The Glow Up</span>
            <div id="glow-up-content" class="min-h-32">
              <p class="animate-pulse">Loading improved bio...</p>
            </div>
            <button class="mt-6 text-xs text-roast-orange hover:text-white transition-colors flex items-center gap-2 uppercase font-bold tracking-tighter" id="copy-button">
              <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
              </svg>
              Copy to Clipboard
            </button>
          </div>
          <div class="absolute bottom-0 left-0 w-full h-1 bg-roast-orange"></div>
        </section>
      </div>

      <!-- Action Buttons -->
      <!-- <div class="flex flex-col sm:flex-row gap-4 pt-8 justify-center items-center">
        <button class="w-full sm:w-auto px-10 py-5 fire-gradient rounded-full font-display text-lg hover:scale-105 active:scale-95 transition-all shadow-[0_0_20px_rgba(255,46,0,0.4)] flex items-center justify-center gap-3" id="share-button">
          <svg class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M24 4.557c-.883.392-1.832.656-2.828.775 1.017-.609 1.798-1.574 2.165-2.724-.951.564-2.005.974-3.127 1.195-.897-.957-2.178-1.555-3.594-1.555-3.179 0-5.515 2.966-4.797 6.045-4.091-.205-7.719-2.165-10.148-5.144-1.29 2.213-.669 5.108 1.523 6.574-.806-.026-1.566-.247-2.229-.616-.054 2.281 1.581 4.415 3.949 4.89-.693.188-1.452.232-2.224.084.626 1.956 2.444 3.379 4.6 3.419-2.07 1.623-4.678 2.348-7.29 2.04 2.179 1.397 4.768 2.212 7.548 2.212 9.142 0 14.307-7.721 13.995-14.646.962-.695 1.797-1.562 2.457-2.549z"></path>
          </svg>
          Share this Roast -->
        </button>
        <a href="/" class="w-full sm:w-auto px-10 py-5 bg-transparent border-2 border-white/20 rounded-full font-display text-lg hover:bg-white hover:text-roast-black transition-all flex items-center justify-center gap-3">
          <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
          </svg>
          Try Another
        </a>
      </div>

      <!-- Footer -->
      <footer class="text-center pt-20 pb-10 border-t border-white/5">
        <p class="text-gray-500 font-display text-sm tracking-widest uppercase mb-4">Brutal Truth by RoastBoy</p>
        <div class="flex justify-center gap-6 opacity-40 grayscale hover:grayscale-0 transition-all">
          <span class="text-2xl">🔥</span>
          <span class="text-2xl">💀</span>
          <span class="text-2xl">⚡</span>
        </div>
      </footer>
    </div>
  </main>

  <!-- Script -->
  <script>
    // Get roast data from sessionStorage
    const roastData = JSON.parse(sessionStorage.getItem('roastData'));

    if (roastData) {
      // Display the roast
      const roastContent = document.getElementById('roast-content');
      roastContent.innerHTML = `<p>${escapeHtml(roastData.roast)}</p>`;

      // Display the improved bio
      const glowUpContent = document.getElementById('glow-up-content');
      glowUpContent.innerHTML = `
        <div class="p-6 bg-black/40 rounded-2xl border border-white/5 shadow-inner">
          <p class="text-xl md:text-2xl font-bold text-white leading-tight">
            "${escapeHtml(roastData.improvedBio)}"
          </p>
        </div>
      `;

      // Copy to clipboard
      document.getElementById('copy-button').addEventListener('click', function() {
        navigator.clipboard.writeText(roastData.improvedBio).then(() => {
          const originalText = this.innerHTML;
          this.innerHTML = 'Copied! 🔥';
          this.classList.add('text-white');
          setTimeout(() => {
            this.innerHTML = originalText;
            this.classList.remove('text-white');
          }, 2000);
        });
      });

      // Share button
      document.getElementById('share-button').addEventListener('click', function() {
        const shareText = `I just got ROASTED by RoastBoy AI! 🔥\n\nRoast: ${roastData.roast}\n\nMy new bio: ${roastData.improvedBio}`;
        
        if (navigator.share) {
          navigator.share({
            title: 'RoastBoy - I got roasted!',
            text: shareText,
            url: window.location.href
          });
        } else {
          // Fallback: copy to clipboard
          navigator.clipboard.writeText(shareText).then(() => {
            alert('Roast copied to clipboard! Share it with your friends! 🔥');
          });
        }
      });
    } else {
      // No roast data, redirect to home
      window.location.href = '/';
    }

    // Helper function to escape HTML
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
